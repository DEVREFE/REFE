<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REFE | Digital Product Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
            },
            colors: {
              brand: {
                black: '#020202', // Purest black
                charcoal: '#0A0A0A',
                neon: '#D9FF00', 
                secondary: '#888888',
              }
            },
            backgroundImage: {
              'grid-pattern': "linear-gradient(to right, #ffffff05 1px, transparent 1px), linear-gradient(to bottom, #ffffff05 1px, transparent 1px)",
            },
            animation: {
              'scroll': 'scroll 40s linear infinite',
              'scroll-reverse': 'scroll-reverse 40s linear infinite',
              'float': 'float 8s ease-in-out infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'aurora': 'aurora 20s ease-in-out infinite alternate',
              'aurora-reverse': 'aurora-reverse 25s ease-in-out infinite alternate',
            },
            keyframes: {
              scroll: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              'scroll-reverse': {
                '0%': { transform: 'translateX(-50%)' },
                '100%': { transform: 'translateX(0)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              aurora: {
                '0%': { opacity: 0.4, transform: 'scale(1) translate(0, 0) rotate(0deg)' },
                '50%': { opacity: 0.6, transform: 'scale(1.4) translate(20px, -50px) rotate(15deg)' },
                '100%': { opacity: 0.4, transform: 'scale(1) translate(-20px, 20px) rotate(0deg)' }
              },
              'aurora-reverse': {
                '0%': { opacity: 0.3, transform: 'scale(1) translate(0, 0)' },
                '100%': { opacity: 0.5, transform: 'scale(1.3) translate(-30px, -40px)' }
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #020202;
        color: #ffffff;
        overflow-x: hidden;
        cursor: none;
      }
      
      /* GLOBAL NOISE TEXTURE - HIGH FIDELITY */
      .bg-noise {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 9998; /* Below cursor, above everything else */
        pointer-events: none;
        opacity: 0.08; /* Slightly more visible but finer */
        mix-blend-mode: overlay; /* Critical for cinematic look */
        /* Increased baseFrequency for finer grain */
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      /* ARCHITECTURAL GRID BACKGROUND */
      .bg-architectural {
        position: fixed;
        inset: 0;
        z-index: -2;
        background-size: 50px 50px;
        background-image: 
          linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        mask-image: radial-gradient(circle at 50% 50%, black 40%, transparent 100%);
        -webkit-mask-image: radial-gradient(circle at 50% 50%, black 40%, transparent 100%);
      }

      /* Custom Cursor */
      .cursor-dot,
      .cursor-outline {
        position: fixed;
        top: 0;
        left: 0;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        z-index: 9999;
        pointer-events: none;
        mix-blend-mode: difference;
      }
      .cursor-dot {
        width: 8px;
        height: 8px;
        background-color: #D9FF00;
      }
      .cursor-outline {
        width: 40px;
        height: 40px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        transition: width 0.2s, height 0.2s, background-color 0.2s;
      }

      body:has(a:hover) .cursor-outline,
      body:has(button:hover) .cursor-outline,
      body:has(.group:hover) .cursor-outline {
        width: 60px;
        height: 60px;
        background-color: rgba(217, 255, 0, 0.05);
        border-color: #D9FF00;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #020202;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
         background: #555;
      }
      
      /* High-End Glass */
      .glass-panel {
        background: rgba(20, 20, 20, 0.4);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      }
      
      /* Utilities */
      .text-glow {
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "framer-motion": "https://esm.sh/framer-motion@^12.23.26",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0"
  }
}
</script>
</head>
  <body>
    <!-- Global Noise Overlay -->
    <div class="bg-noise"></div>

    <!-- Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <script>
      const cursorDot = document.querySelector('.cursor-dot');
      const cursorOutline = document.querySelector('.cursor-outline');
      let mouseX = 0, mouseY = 0, outlineX = 0, outlineY = 0;

      window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        cursorDot.style.left = `${mouseX}px`;
        cursorDot.style.top = `${mouseY}px`;
      });

      function animateCursor() {
        outlineX += (mouseX - outlineX) * 0.15;
        outlineY += (mouseY - outlineY) * 0.15;
        cursorOutline.style.left = `${outlineX}px`;
        cursorOutline.style.top = `${outlineY}px`;
        requestAnimationFrame(animateCursor);
      }
      animateCursor();
    </script>
    
    <!-- Background System -->
    <div class="bg-architectural"></div>
    
    <div id="root"></div>
  </body>
</html>
