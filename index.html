<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REFE — Branding, Desarrollo & Go To Market</title>
  <meta name="description"
    content="REFE es una agencia de branding, desarrollo web y go-to-market para marcas que quieren existir de verdad en el mundo digital." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700;9..40,800&family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['DM Sans', 'sans-serif'],
            mono: ['IBM Plex Mono', 'monospace'],
          },
          colors: {
            refe: {
              black: '#080808',
              ink: '#111111',
              charcoal: '#1a1a1a',
              muted: '#4A4A4A',
              mid: '#8A8A8A',
              light: '#D4D4D4',
              white: '#F0F0F0',
              paper: '#F2F1EF',
              smoke: '#E6E5E2',
              slate: '#1C1C1C',
            }
          },
          animation: {
            'scroll': 'scroll 50s linear infinite',
            'scroll-reverse': 'scroll-reverse 50s linear infinite',
            'fade-up': 'fadeUp 0.8s ease forwards',
            'shimmer': 'shimmer 8s linear infinite',
          },
          keyframes: {
            scroll: {
              '0%': { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-50%)' },
            },
            'scroll-reverse': {
              '0%': { transform: 'translateX(-50%)' },
              '100%': { transform: 'translateX(0)' },
            },
            fadeUp: {
              '0%': { opacity: 0, transform: 'translateY(24px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' },
            },
            shimmer: {
              '0%': { backgroundPosition: '200% 0' },
              '100%': { backgroundPosition: '-200% 0' }
            }
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --refe-black: #080808;
      --refe-ink: #111111;
      --refe-border: rgba(255, 255, 255, 0.07);
      --refe-muted: #4A4A4A;
      --refe-mid: #8A8A8A;
      --refe-light: #D4D4D4;
      --refe-white: #F0F0F0;
      /* Light surface tokens */
      --refe-paper: #F2F1EF;
      --refe-smoke: #E6E5E2;
      --refe-slate: #1C1C1C;
      /* Mouse spotlight */
      --mouse-x: 50%;
      --mouse-y: 50%;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--refe-black);
      color: var(--refe-white);
      overflow-x: hidden;
      cursor: none;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* === GRAIN TEXTURE OVERLAY === */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9998;
      pointer-events: none;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 180px 180px;
    }

    /* === MOUSE SPOTLIGHT (Hero) === */
    .hero-spotlight {
      background-image:
        radial-gradient(700px circle at var(--mouse-x) var(--mouse-y),
          rgba(255, 255, 255, 0.04),
          transparent 60%);
    }

    /* === CUSTOM CURSOR === */
    .cursor-dot,
    .cursor-ring {
      position: fixed;
      top: 0;
      left: 0;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      z-index: 9999;
      pointer-events: none;
    }

    .cursor-dot {
      width: 5px;
      height: 5px;
      background-color: #F0F0F0;
      transition: transform 0.15s ease;
    }

    .cursor-ring {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(240, 240, 240, 0.25);
      transition: width 0.25s ease, height 0.25s ease, border-color 0.25s ease;
    }

    body:has(a:hover) .cursor-ring,
    body:has(button:hover) .cursor-ring {
      width: 52px;
      height: 52px;
      border-color: rgba(240, 240, 240, 0.6);
    }

    body:has(a:hover) .cursor-dot,
    body:has(button:hover) .cursor-dot {
      transform: translate(-50%, -50%) scale(1.8);
    }

    /* === SCROLLBAR === */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--refe-black);
    }

    ::-webkit-scrollbar-thumb {
      background: #2a2a2a;
      border-radius: 2px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3a3a3a;
    }

    /* === GLASS PANEL (neutral) === */
    .glass {
      background: rgba(14, 14, 14, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    /* === SECTION DIVIDER === */
    .refe-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
    }

    /* === WORDMARK === */
    .refe-wordmark {
      font-family: 'DM Sans', sans-serif;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    /* === DISPLAY HEADING === */
    .refe-display {
      font-family: 'DM Sans', sans-serif;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 0.88;
    }

    /* === MONO LABEL === */
    .refe-mono {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* === LIGHT SECTION HELPER === */
    .refe-section-light {
      background-color: var(--refe-paper);
      color: var(--refe-slate);
    }

    /* === SELECTION === */
    ::selection {
      background-color: rgba(240, 240, 240, 0.15);
      color: #F0F0F0;
    }

    /* === HORIZONTAL RULE === */
    hr {
      border-color: rgba(255, 255, 255, 0.07);
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "framer-motion": "https://esm.sh/framer-motion@^12.23.26",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>

<body>
  <!-- Custom Cursor -->
  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>
  <script>
    const dot = document.querySelector('.cursor-dot');
    const ring = document.querySelector('.cursor-ring');
    let mx = 0, my = 0, rx = 0, ry = 0;

    window.addEventListener('mousemove', (e) => {
      mx = e.clientX; my = e.clientY;
      dot.style.left = mx + 'px';
      dot.style.top = my + 'px';
      // Drive mouse spotlight
      document.documentElement.style.setProperty('--mouse-x', mx + 'px');
      document.documentElement.style.setProperty('--mouse-y', my + 'px');
    });

    (function tick() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top = ry + 'px';
      requestAnimationFrame(tick);
    })();
  </script>

  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
